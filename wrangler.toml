name = "gamma-heatmap-pages"
compatibility_date = "2024-05-01"
pages_build_output_dir = "public"

# This is what makes production bindings work
[[durable_objects.bindings]]
name = "GEX_HISTORY_DO"
class_name = "HeatmapBuilderDO"
script_name = "gamma-heatmap-pages"

# --- THIS IS THE PRODUCTION CRON FIX ---
# This replaces the [triggers] block
# This tells the *production* cron to send a request to /__cron
# which will be handled by our fetch() function.
[crons]
triggers = [
  { cron = "*/2 * * * *", path = "/__cron" } 
]
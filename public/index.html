<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma Chart</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #eee;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        input, select {
            padding: 8px;
            background-color: #333;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
        }
        #chart {
            width: 100%;
            height: 600px;
            background-color: #222;
        }
        #loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Intraday Gamma Exposure</h1>
        <div class="controls">
            <input id="ticker" type="text" value="SPY">
            <select id="interval">
                <option value="1m">1m</option>
                <option value="2m">2m</option>
                <option value="5m" selected>5m</option>
                <option value="15m">15m</option>
                <option value="30m">30m</option>
            </select>
        </div>
        <div id="chart"></div>
        <div id="loading">Loading chart data...</div>
    </div>

    <script>
        const tickerInput = document.getElementById('ticker');
        const intervalSelect = document.getElementById('interval');
        const chartDiv = document.getElementById('chart');
        const loadingDiv = document.getElementById('loading');

        // --- State Management ---
        let latestGammaData = null;
        let latestOhlcData = null;
        let gammaTimer = null;
        let ohlcTimer = null;

        // --- PLOTTING FUNCTION (REFACTORED) ---
        function plotCombinedChart() {
            // Wait until both datasets are loaded
            if (!latestGammaData || !latestOhlcData) {
                console.log('Waiting for both datasets to load...');
                return;
            }
            
            setLoading(false);

            // --- 1. Create Session Markers (Lines and Labels) ---
            // This reads the new 'sessionMarkers' array from the API
            const sessionShapes = latestGammaData.sessionMarkers.map(marker => ({
                type: 'line',
                xref: 'x',
                yref: 'paper', // 'paper' spans the whole y-axis from 0 to 1
                x0: marker.x,
                y0: 0,
                x1: marker.x,
                y1: 1,
                line: {
                    color: 'rgba(200, 200, 200, 0.7)',
                    width: 1,
                    dash: 'dot'
                }
            }));

            const sessionAnnotations = latestGammaData.sessionMarkers.map(marker => ({
                x: marker.x,
                y: 1.05, // Position label just above the chart
                xref: 'x',
                yref: 'paper',
                text: marker.label.replace('_', ' ').toUpperCase(), // 'mkt_open' -> 'MKT OPEN'
                showarrow: false,
                font: {
                    color: 'rgba(200, 200, 200, 0.7)',
                    size: 10
                },
                xanchor: 'right' // Anchor label to the right of the line
            }));

            // --- 2. Define Plotly Data ---
            // This is simple: the backend already formatted the 'heatmapTrace'
            const data = [
                latestGammaData.heatmapTrace, 
                latestOhlcData.ohlcTrace
            ];

            // --- 3. Define Plotly Layout ---
            const layout = {
                title: `${tickerInput.value.toUpperCase()} Gamma Exposure (Spot: ${latestGammaData.spot})`,
                xaxis: {
                    title: "mte",
                    // The new heatmapTrace.x is the full, combined mte list.
                    // We reverse the range just like the old code did.
                    range: [
                        latestGammaData.heatmapTrace.x[latestGammaData.heatmapTrace.x.length - 1], 
                        latestGammaData.heatmapTrace.x[0]
                    ],
                    rangeslider: { visible: false }
                },
                yaxis: {
                    title: "strike",
                    // The limits are still sent on the root object
                    range: [latestGammaData.limits.down, latestGammaData.limits.up]
                },
                xaxis2: {
                    overlaying: 'x',
                    range: latestOhlcData.mktHoursRange,
                    rangeslider: { visible: false },
                    anchor: 'y',
                    showgrid: false,
                    showticklabels: false
                },
                uirevision: tickerInput.value,
                margin: { l: 50, r: 10, b: 50, t: 50 },
                
                // --- 4. Add the new shapes, annotations, and theme ---
                shapes: sessionShapes,
                annotations: sessionAnnotations,
                plot_bgcolor: '#222',
                paper_bgcolor: '#111',
                font: { color: '#eee' }
            };

            Plotly.react(chartDiv, data, layout, { displaylogo: false });
        }
        
        // --- DATA FETCHING (Unchanged) ---
        async function fetchGamma() {
            const ticker = tickerInput.value || 'SPY';
            try {
                // This path is still correct. The worker routes it.
                const res = await fetch(`/api/get-gamma-api?ticker=${ticker}`);
                
                const contentType = res.headers.get("content-type");
                if (res.ok && contentType && contentType.includes("application/json")) {
                    latestGammaData = await res.json();
                } else {
                    const errorJson = await res.json();
                    throw new Error(errorJson.error || 'Failed to load gamma data');
                }
                
                plotCombinedChart(); // Attempt to plot
            } catch (error) {
                console.error('Error fetching gamma:', error);
                chartDiv.innerHTML = `<p style="padding: 20px; color: #ff9999;">Error loading gamma: ${error.message}</p>`;
                setLoading(false);
            }
        }

        async function fetchOhlc() {
            const ticker = tickerInput.value || 'SPY';
            const interval = intervalSelect.value;
            try {
                const res = await fetch(`/api/get-ohlc?ticker=${ticker}&interval=${interval}`);
                if (!res.ok) throw new Error('Failed to fetch OHLC data');
                
                latestOhlcData = await res.json();
                plotCombinedChart(); // Attempt to plot
            } catch (error) {
                console.error('Error fetching OHLC:', error);
            }
        }

        function setLoading(isLoading) {
            loadingDiv.style.display = isLoading ? 'block' : 'none';
            chartDiv.style.display = isLoading ? 'none' : 'block';
        }
        
        // --- APP START (Unchanged) ---
        function startApp() {
            console.log('Starting app...');
            setLoading(true);
            
            if (gammaTimer) clearInterval(gammaTimer);
            if (ohlcTimer) clearInterval(ohlcTimer);

            fetchGamma();
            fetchOhlc();

            gammaTimer = setInterval(fetchGamma, 60 * 1000); 
            ohlcTimer = setInterval(fetchOhlc, 10 * 1000); 
        }

        // --- Event Listeners (Unchanged) ---
        tickerInput.addEventListener('change', startApp);
        intervalSelect.addEventListener('change', startApp);
        document.addEventListener('DOMContentLoaded', startApp);

    </script>
</body>
</html>

name = "gex"
main = "src/index.ts"
compatibility_date = "2024-05-01"

[durable_objects]
bindings = [
  { name = "GEX_HISTORY_DO", class_name = "HeatmapBuilderDO" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "HeatmapBuilderDO" ]

# --- OPTIMIZED CRON ---
# Run every 5 minutes, hours 13-21 UTC (covers US market hours in both EST/EDT)
# Monday through Friday only.
[triggers]
crons = ["*/5 13-21 * * 1-5"]

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamma Chart</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #111;
            color: #eee;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #eee;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: #222;
            padding: 15px;
            border-radius: 8px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label {
            font-size: 0.8em;
            color: #aaa;
        }
        input, select {
            padding: 8px;
            background-color: #333;
            color: #eee;
            border: 1px solid #555;
            border-radius: 4px;
            min-width: 100px;
        }
        #chart {
            width: 100%;
            height: 600px;
            background-color: #222;
            border-radius: 8px;
        }
        #loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Intraday Gamma Exposure</h1>
        <div class="controls">
            <div class="control-group">
                <label for="ticker">Ticker</label>
                <input id="ticker" type="text" value="SPY">
            </div>
            
            <div class="control-group">
                <label for="dateSelect">Date</label>
                <select id="dateSelect">
                    <option value="" disabled selected>Loading...</option>
                </select>
            </div>

            <div class="control-group">
                <label for="interval">OHLC Interval</label>
                <select id="interval">
                    <option value="1m">1m</option>
                    <option value="2m">2m</option>
                    <option value="5m" selected>5m</option>
                    <option value="15m">15m</option>
                    <option value="30m">30m</option>
                </select>
            </div>
        </div>
        <div id="chart"></div>
        <div id="loading">Loading chart data...</div>
    </div>

    <script>
        const tickerInput = document.getElementById('ticker');
        const intervalSelect = document.getElementById('interval');
        const dateSelect = document.getElementById('dateSelect');
        const chartDiv = document.getElementById('chart');
        const loadingDiv = document.getElementById('loading');
        
        // --- CONFIG ---
        const WORKER_URL = "https://1001terminal-worker.1001encore.workers.dev";

        // --- State ---
        let latestGammaData = null;
        let latestOhlcData = null;
        let gammaTimer = null;
        let ohlcTimer = null;

        // --- 1. Fetch Available Dates ---
        async function fetchAvailableDates() {
            try {
                const ticker = tickerInput.value;
                const res = await fetch(`${WORKER_URL}/api/get-dates?ticker=${ticker}`);
                if (!res.ok) throw new Error("Failed to fetch dates");
                
                const dates = await res.json();
                
                // Clear existing options
                dateSelect.innerHTML = '';
                
                if (dates.length === 0) {
                    const option = document.createElement('option');
                    option.text = "No Data Yet";
                    dateSelect.add(option);
                    return;
                }

                // Populate Dropdown
                dates.forEach(date => {
                    const option = document.createElement('option');
                    option.value = date;
                    option.text = date;
                    dateSelect.add(option);
                });

                // Select the LATEST date by default (last in array)
                dateSelect.value = dates[dates.length - 1];

                // Trigger initial data load
                startApp(); 

            } catch (err) {
                console.error("Error fetching dates:", err);
                dateSelect.innerHTML = '<option>Error</option>';
            }
        }

        // --- 2. Plotting Logic ---
        function plotCombinedChart() {
            if (!latestGammaData || !latestOhlcData) return;
            setLoading(false);

            const sessionShapes = latestGammaData.sessionMarkers.map(marker => ({
                type: 'line',
                xref: 'x', yref: 'paper',
                x0: marker.x, y0: 0, x1: marker.x, y1: 1,
                line: { color: 'rgba(200, 200, 200, 0.5)', width: 1, dash: 'dot' }
            }));

            // Use the DATE from the backend to set the title
            const chartTitle = `${tickerInput.value.toUpperCase()} Gamma - ${latestGammaData.date} (Spot: ${latestGammaData.spot})`;

            const layout = {
                title: chartTitle,
                xaxis: {
                    title: "mte",
                    range: [latestGammaData.heatmapTrace.x[latestGammaData.heatmapTrace.x.length - 1], latestGammaData.heatmapTrace.x[0]],
                    rangeslider: { visible: false }
                },
                yaxis: {
                    title: "strike",
                    range: [latestGammaData.limits.down, latestGammaData.limits.up]
                },
                xaxis2: {
                    overlaying: 'x',
                    range: latestOhlcData.mktHoursRange,
                    rangeslider: { visible: false },
                    anchor: 'y',
                    showgrid: false,
                    showticklabels: false
                },
                uirevision: tickerInput.value + latestGammaData.date,
                margin: { l: 50, r: 10, b: 50, t: 50 },
                shapes: sessionShapes,
                plot_bgcolor: '#222',
                paper_bgcolor: '#111',
                font: { color: '#eee' }
            };

            const data = [latestGammaData.heatmapTrace, latestOhlcData.ohlcTrace];
            Plotly.react(chartDiv, data, layout, { displaylogo: false });
        }

        async function fetchGamma() {
            const ticker = tickerInput.value;
            const date = dateSelect.value; 
            
            // If we haven't loaded dates yet, don't fetch gamma
            if (!date || date === "Loading..." || date === "No Data Yet") return;

            try {
                // Pass the selected date to the backend
                const res = await fetch(`${WORKER_URL}/api/get-gamma-api?ticker=${ticker}&date=${date}`);
                if (res.ok) {
                    latestGammaData = await res.json();
                    plotCombinedChart();
                }
            } catch (error) {
                console.error('Error fetching gamma:', error);
            }
        }

        async function fetchOhlc() {
            const ticker = tickerInput.value;
            const interval = intervalSelect.value;
            try {
                const res = await fetch(`${WORKER_URL}/api/get-ohlc?ticker=${ticker}&interval=${interval}`);
                if (res.ok) {
                    latestOhlcData = await res.json();
                    plotCombinedChart();
                }
            } catch (error) {
                console.error('Error fetching OHLC:', error);
            }
        }

        function setLoading(isLoading) {
            loadingDiv.style.display = isLoading ? 'block' : 'none';
            chartDiv.style.display = isLoading ? 'none' : 'block';
        }
        
        function startApp() {
            console.log('Fetching data for:', dateSelect.value);
            setLoading(true);
            
            if (gammaTimer) clearInterval(gammaTimer);
            if (ohlcTimer) clearInterval(ohlcTimer);

            fetchGamma();
            fetchOhlc();

            gammaTimer = setInterval(fetchGamma, 60 * 1000); 
            ohlcTimer = setInterval(fetchOhlc, 30 * 1000); 
        }

        // Initialize
        tickerInput.addEventListener('change', fetchAvailableDates);
        dateSelect.addEventListener('change', startApp);
        intervalSelect.addEventListener('change', startApp);
        
        // On Load: Fetch dates first. That function will trigger startApp()
        document.addEventListener('DOMContentLoaded', fetchAvailableDates);

    </script>
</body>
</html>
